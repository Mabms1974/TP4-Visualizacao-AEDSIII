<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Produtos – Visualização em Bytes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>📦 CRUD de Produtos com Visualização em Bytes</h1>
        <p>AEDs III · PUC Minas</p>
    </header>

    <main>
        <!-- Formulários para as 4 operações -->
        <section id="forms">
            <div class="form-card">
                <h2>➕ Inserir</h2>
                <div class="form-row">
                    <input type="number" id="inserir-id" placeholder="ID">
                    <input type="text" id="inserir-nome" placeholder="Nome">
                    <input type="number" step="0.01" id="inserir-preco" placeholder="Preço">
                    <input type="number" id="inserir-qtd" placeholder="Quantidade">
                    <button id="btn-inserir">Inserir</button>
                </div>
            </div>

            <div class="form-card">
                <h2>🔍 Buscar</h2>
                <div class="form-row">
                    <input type="number" id="buscar-id" placeholder="ID">
                    <button id="btn-buscar">Buscar</button>
                </div>
                <div id="resultado-busca" class="result-box"></div>
            </div>

            <div class="form-card">
                <h2>✏️ Alterar</h2>
                <div class="form-row">
                    <input type="number" id="alterar-id" placeholder="ID">
                    <select id="alterar-campo">
                        <option value="nome">Nome</option>
                        <option value="preco">Preço</option>
                        <option value="quantidade">Quantidade</option>
                    </select>
                    <input type="text" id="alterar-valor" placeholder="Novo valor">
                    <button id="btn-alterar">Alterar</button>
                </div>
            </div>

            <div class="form-card">
                <h2>🗑️ Excluir</h2>
                <div class="form-row">
                    <input type="number" id="excluir-id" placeholder="ID">
                    <button id="btn-excluir">Excluir</button>
                </div>
            </div>
        </section>

        <!-- Feedback ao usuário -->
        <div id="mensagem" class="mensagem"></div>

        <!-- Visualização dos bytes -->
        <section id="visualizacao">
            <h2>🧩 Visualização dos Bytes</h2>
            <div id="bytes-visualization"></div>
        </section>
    </main>

    <footer>
        <p>TP4 · AEDs III · PUC Minas</p>
    </footer>

    <!-- Scripts carregados na ordem correta -->
    <script src="js/ByteStream.js"></script>
    <script src="js/dados.js"></script>
    <script src="js/crud.js"></script>
    <script src="js/render.js"></script>
    <script src="js/controller.js"></script>
</body>
</html>
